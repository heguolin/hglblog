# 图床 Nginx 配置 — img.hgl123.icu
# 路径: /etc/nginx/conf.d/image-host.conf
# 新增 /thumb/ 动态缩略图功能
# 新增 /_raw/i/ 内部重定向（供 /thumb/ 使用）

server {
    server_name img.hgl123.xyz img.hgl123.icu;

    client_max_body_size 20M;

    # ====== 缩略图 —— 直接读文件 + 动态缩放 ======
    location ~ ^/thumb/(.+)$ {
        alias /opt/Image-Host/server/uploads/$1;
        image_filter resize $thumb_width -;
        image_filter_jpeg_quality 80;
        image_filter_buffer 10M;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ====== 原有静态文件 ======
    location /i/ {
        alias /opt/Image-Host/server/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ====== 原有 API ======
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/img.hgl123.icu/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/img.hgl123.icu/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = img.hgl123.icu) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name img.hgl123.xyz img.hgl123.icu;
    return 404; # managed by Certbot
}
