# 博客 Nginx 配置 — hgl123.icu
# 路径: /etc/nginx/sites-available/hglblog (软链接到 sites-enabled)

server {
    listen 443 ssl http2;
    server_name hgl123.icu;

    # SSL 证书（Certbot 自动管理）
    ssl_certificate     /etc/letsencrypt/live/hgl123.icu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hgl123.icu/privkey.pem;

    # 前端静态文件
    root /var/www/blog;
    index index.html;

    # SPA 路由兜底
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 看板娘聊天 API —— 代理到本地微调模型
    location /api/mascot/chat {
        proxy_pass http://127.0.0.1:8001/v1/chat/completions;
        proxy_set_header Host $host;
        proxy_read_timeout 60s;
    }

    # 后端 API 反代
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    # 构建产物（文件名带内容哈希，可永久缓存）
    location ^~ /assets/ {
        root /var/www/blog;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Live2D 模型文件（URL 不带哈希、内容会变，必须每次校验，否则更新后浏览器仍用旧缓存）
    location ^~ /live2d/ {
        root /var/www/blog;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # 其它静态资源
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        root /var/www/blog;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/rss+xml image/svg+xml;
}

# HTTP → HTTPS 跳转
server {
    listen 80;
    server_name hgl123.icu;
    return 301 https://$host$request_uri;
}
